    <script>
        document.addEventListener("DOMContentLoaded", () => {
            /* === 輪播圖邏輯 === */
            const cards = document.querySelectorAll(".carousel-card");
            const dots = document.querySelectorAll(".dot-icon");
            let currentIndex = 0;
            const totalCards = cards.length;

            function updateCarousel(targetIndex) {
                currentIndex = (targetIndex + totalCards) % totalCards;
                cards.forEach((card, i) => {
                    card.className = "carousel-card";
                    let diff = i - currentIndex;
                    if (diff < -2) diff += totalCards;
                    if (diff > 2) diff -= totalCards;

                    if (diff === 0) card.classList.add("active");
                    else if (diff === 1 || diff === -(totalCards - 1)) card.classList.add("next");
                    else if (diff === -1 || diff === (totalCards - 1)) card.classList.add("prev");
                    else if (diff > 1) card.classList.add("hidden-right");
                    else if (diff < -1) card.classList.add("hidden-left");
                });
                dots.forEach((dot, idx) => {
                    if (idx === currentIndex) dot.classList.add("active");
                    else dot.classList.remove("active");
                });
            }
            cards.forEach(card => {
                card.addEventListener("click", () => {
                    const index = parseInt(card.getAttribute("data-index"));
                    if (card.classList.contains("next") || card.classList.contains("prev")) updateCarousel(index);
                });
            });
            dots.forEach(dot => {
                dot.addEventListener("click", () => {
                    updateCarousel(parseInt(dot.getAttribute("data-target")));
                });
            });
            updateCarousel(0);
        });
    </script>
