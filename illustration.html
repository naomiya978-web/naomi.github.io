    <div class="retro-modal-overlay" id="detailModal">
        <div class="retro-window detail-window">
            <div class="retro-title-bar">
                <span class="retro-title-text">ARTWORK</span>
                <div class="retro-close-x" id="detailModalXClose">X</div>
            </div>
            <div class="detail-modal-body">
                <div class="modal-left-img">
                    <img src="" id="modalImg" alt="Expanded Art">
                </div>
                <div class="modal-right-info">
                    <h2 class="modal-art-title" id="modalArtName">Artwork Title</h2>
                    <p class="modal-art-desc" id="modalArtDesc">Description text...</p>
                    <div class="modal-art-meta">
                        <p id="modalArtDate">DATE: 2026/05</p>
                    </div>
                    <button class="retro-ok-btn detail-ok-btn" id="detailModalCloseBtn">CLOSE</button>
                </div>
            </div>
        </div>
    </div>

    <div class="retro-modal-overlay" id="retroModal">
        <div class="retro-window">
            <div class="retro-title-bar">
                <span class="retro-title-text">Contact</span>
                <div class="retro-close-x" id="modalXClose">X</div>
            </div>
            <div class="retro-body">
                <p class="retro-text">EMAIL:<br>naomiya978@gmail.com</p>
                <button class="retro-ok-btn" id="modalOkClose">Send</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const menuToggle = document.getElementById("menuToggle");
            const sidebarOverlay = document.getElementById("sidebarOverlay");

            // 側邊欄開關邏輯
            menuToggle.addEventListener("click", () => {
                menuToggle.classList.toggle("active");
                sidebarOverlay.classList.toggle("open");
            });

            sidebarOverlay.addEventListener("click", (e) => {
                if (e.target === sidebarOverlay) {
                    menuToggle.classList.remove("active");
                    sidebarOverlay.classList.remove("open");
                }
            });

            /* === 聯絡彈窗事件 === */
            const contractTrigger = document.getElementById("contractTrigger");
            const retroModal = document.getElementById("retroModal");
            const modalXClose = document.getElementById("modalXClose");
            const modalOkClose = document.getElementById("modalOkClose");

            if (contractTrigger && retroModal) {
                // 打開彈出視窗
                contractTrigger.addEventListener("click", () => {
                    retroModal.classList.add("show");
                });

                // 關閉彈出視窗的函式
                const closeContactModal = () => {
                    retroModal.classList.remove("show");
                };

                // 點擊 X 關閉視窗
                if (modalXClose) modalXClose.addEventListener("click", closeContactModal);

                // 【修正核心】點擊 Send 按鈕：打開系統郵件軟體 + 關閉視窗
                if (modalOkClose) {
                    modalOkClose.addEventListener("click", () => {
                        // 觸發系統預設郵件客戶端，並自動帶入你的 Email
                        window.location.href = "mailto:naomiya978@gmail.com?subject=Hello Naomi!";

                        // 開啟後將彈出視窗關閉
                        closeContactModal();
                    });
                }

                // 點擊視窗外部空白處關閉
                retroModal.addEventListener("click", (e) => {
                    if (e.target === retroModal) {
                        closeContactModal();
                    }
                });
            }

            /* === 【補回】插畫詳情彈窗事件邏輯 === */
            const galleryItems = document.querySelectorAll(".gallery-item");
            const detailModal = document.getElementById("detailModal");
            const modalImg = document.getElementById("modalImg");
            const modalArtName = document.getElementById("modalArtName");
            const modalArtDesc = document.getElementById("modalArtDesc");
            const modalArtDate = document.getElementById("modalArtDate");
            const detailModalXClose = document.getElementById("detailModalXClose");
            const detailModalCloseBtn = document.getElementById("detailModalCloseBtn");

            if (galleryItems.length > 0 && detailModal) {
                galleryItems.forEach(item => {
                    item.addEventListener("click", () => {
                        const imgEl = item.querySelector("img");
                        const title = item.getAttribute("data-title");
                        const desc = item.getAttribute("data-desc");
                        const date = item.getAttribute("data-date");

                        if (imgEl) modalImg.src = imgEl.src;
                        if (modalArtName) modalArtName.textContent = title || "";
                        if (modalArtDesc) modalArtDesc.textContent = desc || "";
                        if (modalArtDate) modalArtDate.textContent = date ? `DATE: ${date}` : "";

                        detailModal.classList.add("show");
                    });
                });

                const closeDetailModal = () => {
                    detailModal.classList.remove("show");
                };

                if (detailModalXClose) detailModalXClose.addEventListener("click", closeDetailModal);
                if (detailModalCloseBtn) detailModalCloseBtn.addEventListener("click", closeDetailModal);

                detailModal.addEventListener("click", (e) => {
                    if (e.target === detailModal) {
                        closeDetailModal();
                    }
                });
            }
        });
    </script>
